name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: admin-team-pokemon

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Build project and run tests
        run: ./mvnw clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest .
            
      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image for Amazon ECR
        if: github.event_name == 'push'
        run: |
          docker tag \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.AWS_ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      
          docker tag \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.AWS_ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Push image to Amazon ECR
        if: github.event_name == 'push'
        run: |
          docker push \
            ${{ secrets.AWS_ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      
          docker push \
            ${{ secrets.AWS_ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Render ECS task definition
        if: github.event_name == 'push'
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .github/ecs-task-definition.json
          container-name: pokemon-api
          image: ${{ secrets.AWS_ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
    
      - name: Deploy to Amazon ECS
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: pokemon-api-service
          cluster: pokemon-admin
          wait-for-service-stability: true